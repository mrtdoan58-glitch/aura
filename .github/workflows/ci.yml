name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Types · Unit/Integration/DB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: ESLint
        run: npm run lint
      - name: TypeScript
        run: npm run typecheck
      - name: Unit + Integration + DB (real Postgres via PGlite)
        run: npm run test

  build:
    name: Production Build + Bundle Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Build
        run: npm run build
        env:
          AUTH_DRIVER: memory
      - name: Bundle analyze
        run: ANALYZE=true npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: bundle-report
          path: .next/analyze/

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aura
          POSTGRES_PASSWORD: aura
          POSTGRES_DB: aura
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aura"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://aura:aura@localhost:5432/aura
      AUTH_DRIVER: memory
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run build
      - name: Run E2E
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build production image
        run: docker build -t aura:ci .
      - name: Build dev image
        run: docker build -f Dockerfile.dev -t aura:ci-dev .

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # gitleaks diffs against the PR's parent commit; the default shallow
          # clone (depth 1) doesn't have that object, so `git log <sha>^..<sha>`
          # fails with "unknown revision" on pull_request-triggered runs.
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high || true
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
